# OPTION 1: Fixed Release Workflow (Recommended)
# This version has proper error handling and cross-compilation fixes

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:  # Allow manual triggers

env:
  CMAKE_BUILD_TYPE: Release

jobs:
  build-windows:
    name: Build Windows x64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        working-directory: native
        run: cmake -B build -A x64 -DCMAKE_BUILD_TYPE=${{ env.CMAKE_BUILD_TYPE }} -DSPECTRA_BUILD_TESTS=OFF

      - name: Build
        working-directory: native
        run: cmake --build build --config ${{ env.CMAKE_BUILD_TYPE }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: spectra-windows-x64
          path: |
            native/build/lib/Release/*.dll
            native/build/bin/Release/*.dll

  build-macos:
    name: Build macOS Universal
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # Build for x86_64 first
      - name: Configure x86_64
        working-directory: native
        run: |
          cmake -B build-x86_64 \
            -DCMAKE_OSX_ARCHITECTURES=x86_64 \
            -DCMAKE_BUILD_TYPE=${{ env.CMAKE_BUILD_TYPE }} \
            -DSPECTRA_BUILD_TESTS=OFF

      - name: Build x86_64
        working-directory: native
        run: cmake --build build-x86_64 --config ${{ env.CMAKE_BUILD_TYPE }}

      # Build for arm64
      - name: Configure arm64
        working-directory: native
        run: |
          cmake -B build-arm64 \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_BUILD_TYPE=${{ env.CMAKE_BUILD_TYPE }} \
            -DSPECTRA_BUILD_TESTS=OFF

      - name: Build arm64
        working-directory: native
        run: cmake --build build-arm64 --config ${{ env.CMAKE_BUILD_TYPE }}

      # Create universal binary
      - name: Create Universal Binary
        working-directory: native
        run: |
          mkdir -p build-universal/lib
          lipo -create \
            build-x86_64/lib/libspectra.dylib \
            build-arm64/lib/libspectra.dylib \
            -output build-universal/lib/libspectra.dylib

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: spectra-macos-universal
          path: native/build-universal/lib/*.dylib

  build-linux:
    name: Build Linux x64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        working-directory: native
        run: cmake -B build -DCMAKE_BUILD_TYPE=${{ env.CMAKE_BUILD_TYPE }} -DSPECTRA_BUILD_TESTS=OFF

      - name: Build
        working-directory: native
        run: cmake --build build --config ${{ env.CMAKE_BUILD_TYPE }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: spectra-linux-x64
          path: native/build/lib/*.so

  build-mobile:
    name: Build Mobile
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Android NDK
        uses: android-actions/setup-android@v3

      - name: Build Android ARM64
        working-directory: native
        run: |
          cmake -B build-android-arm64 \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-24 \
            -DCMAKE_BUILD_TYPE=${{ env.CMAKE_BUILD_TYPE }} \
            -DSPECTRA_BUILD_TESTS=OFF
          cmake --build build-android-arm64

      - name: Build Android ARMv7
        working-directory: native
        run: |
          cmake -B build-android-armv7 \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=armeabi-v7a \
            -DANDROID_PLATFORM=android-24 \
            -DCMAKE_BUILD_TYPE=${{ env.CMAKE_BUILD_TYPE }} \
            -DSPECTRA_BUILD_TESTS=OFF
          cmake --build build-android-armv7

      - name: Build iOS
        working-directory: native
        run: |
          cmake -B build-ios \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=13.0 \
            -DCMAKE_BUILD_TYPE=${{ env.CMAKE_BUILD_TYPE }} \
            -DSPECTRA_BUILD_TESTS=OFF \
            -DENABLE_BITCODE=OFF
          cmake --build build-ios

      - name: Upload Android ARM64
        uses: actions/upload-artifact@v4
        with:
          name: spectra-android-arm64
          path: native/build-android-arm64/lib/*.so

      - name: Upload Android ARMv7
        uses: actions/upload-artifact@v4
        with:
          name: spectra-android-armv7
          path: native/build-android-armv7/lib/*.so

      - name: Upload iOS
        uses: actions/upload-artifact@v4
        with:
          name: spectra-ios
          path: native/build-ios/lib/*.a

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-windows, build-macos, build-linux, build-mobile]
    if: always()  # Run even if some builds fail
    steps:
      - uses: actions/checkout@v4

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List Downloaded Artifacts
        run: find artifacts -type f

      - name: Organize Unity Package
        run: |
          mkdir -p unity-package/Runtime/Plugins/Windows/x86_64
          mkdir -p unity-package/Runtime/Plugins/macOS
          mkdir -p unity-package/Runtime/Plugins/Linux/x86_64
          mkdir -p unity-package/Runtime/Plugins/Android/libs/arm64-v8a
          mkdir -p unity-package/Runtime/Plugins/Android/libs/armeabi-v7a
          mkdir -p unity-package/Runtime/Plugins/iOS

          # Copy artifacts (|| true means continue even if some fail)
          cp artifacts/spectra-windows-x64/*.dll unity-package/Runtime/Plugins/Windows/x86_64/ 2>/dev/null || echo "Windows build not available"
          cp artifacts/spectra-macos-universal/*.dylib unity-package/Runtime/Plugins/macOS/ 2>/dev/null || echo "macOS build not available"
          cp artifacts/spectra-linux-x64/*.so unity-package/Runtime/Plugins/Linux/x86_64/ 2>/dev/null || echo "Linux build not available"
          cp artifacts/spectra-android-arm64/*.so unity-package/Runtime/Plugins/Android/libs/arm64-v8a/ 2>/dev/null || echo "Android ARM64 build not available"
          cp artifacts/spectra-android-armv7/*.so unity-package/Runtime/Plugins/Android/libs/armeabi-v7a/ 2>/dev/null || echo "Android ARMv7 build not available"
          cp artifacts/spectra-ios/*.a unity-package/Runtime/Plugins/iOS/ 2>/dev/null || echo "iOS build not available"

          # Copy Unity scripts
          cp -r unity/Runtime/Scripts unity-package/Runtime/
          cp unity/package.json unity-package/
          find unity/Runtime -name "*.asmdef" -exec cp {} unity-package/Runtime/ \;

      - name: Create Unity Package Archive
        run: |
          cd unity-package
          zip -r ../spectra-unity-${{ github.ref_name }}.zip .

      - name: Get Release Notes
        id: release_notes
        run: |
          if [ -f "docs/RELEASE_NOTES_${{ github.ref_name }}.md" ]; then
            echo "Using release notes from docs/RELEASE_NOTES_${{ github.ref_name }}.md"
            cat docs/RELEASE_NOTES_${{ github.ref_name }}.md > release_notes.md
          else
            echo "No release notes found, using default"
            echo "## SpectraCore ${{ github.ref_name }}" > release_notes.md
            echo "" >> release_notes.md
            echo "See CHANGELOG.md for details." >> release_notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            spectra-unity-${{ github.ref_name }}.zip
          body_path: release_notes.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
