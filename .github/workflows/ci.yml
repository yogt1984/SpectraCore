name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CMAKE_BUILD_TYPE: Release

jobs:
  build-native:
    name: Build Native (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            cmake_args: ""
          - os: macos-latest
            cmake_args: ""

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Check Submodules
        run: git submodule status

      - name: Configure CMake
        working-directory: native
        run: cmake -B build ${{ matrix.cmake_args }} -DCMAKE_BUILD_TYPE=${{ env.CMAKE_BUILD_TYPE }}

      - name: Build
        working-directory: native
        run: cmake --build build --config ${{ env.CMAKE_BUILD_TYPE }}

      - name: Run Tests
        working-directory: native
        run: ctest --test-dir build -C ${{ env.CMAKE_BUILD_TYPE }} --output-on-failure

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.os }}
          path: |
            native/build/lib/*
            native/build/bin/*

  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install clang-tidy
        run: sudo apt-get install -y clang-tidy

      - name: Configure
        working-directory: native
        run: cmake -B build -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Run clang-tidy
        working-directory: native
        run: |
          find src include -name '*.cpp' -o -name '*.hpp' | \
            xargs clang-tidy -p build --warnings-as-errors='*' || true

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Android NDK
        uses: android-actions/setup-android@v3

      - name: Build for Android
        working-directory: native
        run: |
          cmake -B build-android \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-24 \
            -DCMAKE_BUILD_TYPE=${{ env.CMAKE_BUILD_TYPE }} \
            -DSPECTRA_BUILD_TESTS=OFF
          cmake --build build-android

      - name: Upload Android Artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-android
          path: native/build-android/lib/*

  build-ios:
    name: Build iOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build for iOS
        working-directory: native
        run: |
          cmake -B build-ios \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=13.0 \
            -DCMAKE_BUILD_TYPE=${{ env.CMAKE_BUILD_TYPE }} \
            -DSPECTRA_BUILD_TESTS=OFF \
            -DENABLE_BITCODE=OFF
          cmake --build build-ios

      - name: Upload iOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-ios
          path: native/build-ios/lib/*

  unity-tests:
    name: Unity Tests
    runs-on: ubuntu-latest
    needs: [build-native]
    if: always()  # Run even if some builds fail
    steps:
      - uses: actions/checkout@v4

      - name: Download Native Libraries
        uses: actions/download-artifact@v4
        with:
          name: native-ubuntu-latest
          path: unity/Runtime/Plugins/Linux
        continue-on-error: true

      - name: Setup Unity
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
        with:
          projectPath: unity
          testMode: editmode
          githubToken: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true  # Don't fail CI if Unity license not available

